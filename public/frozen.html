<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>[💤 Standby] MemDOM Master</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&family=Space+Grotesk:wght@500;700&display=swap');

    body {
      background-color: #0b0f19;
      color: #9ca3af;
      font-family: 'Plus Jakarta Sans', sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      margin: 0;
      user-select: none;
      overflow: hidden;
      position: relative;
      cursor: pointer; /* Toàn bộ trang có thể click để khôi phục */
    }

    /* Background futuristic grids & glow */
    body::before {
      content: '';
      position: absolute;
      inset: 0;
      background: 
        radial-gradient(circle at 15% 15%, rgba(56, 189, 248, 0.05) 0%, transparent 40%),
        radial-gradient(circle at 85% 85%, rgba(139, 92, 246, 0.05) 0%, transparent 40%);
      z-index: 0;
      pointer-events: none;
    }

    body::after {
      content: '';
      position: absolute;
      width: 100%;
      height: 100%;
      background-image: 
        linear-gradient(rgba(255, 255, 255, 0.02) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255, 255, 255, 0.02) 1px, transparent 1px);
      background-size: 30px 30px;
      z-index: 0;
      pointer-events: none;
      opacity: 0.6;
    }

    .container {
      position: relative;
      z-index: 10;
      text-align: center;
      width: 100%;
      max-width: 520px;
      padding: 2.5rem;
      border: 1px solid rgba(56, 189, 248, 0.15);
      border-radius: 24px;
      background: rgba(15, 23, 42, 0.7);
      backdrop-filter: blur(20px);
      box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5), 
                  0 0 40px rgba(56, 189, 248, 0.05);
      animation: container-glow 5s infinite alternate;
    }

    @keyframes container-glow {
      0% { border-color: rgba(56, 189, 248, 0.15); }
      100% { border-color: rgba(139, 92, 246, 0.3); }
    }

    /* Radar Heartbeat Pulse */
    .radar-box {
      margin: 0 auto 1.5rem;
      position: relative;
      width: 80px;
      height: 80px;
      border-radius: 50%;
      border: 1px dashed rgba(56, 189, 248, 0.3);
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .radar-pulse-1, .radar-pulse-2 {
      position: absolute;
      inset: 0;
      border-radius: 50%;
      border: 1px solid #38bdf8;
      opacity: 0;
      animation: pulse-out 3s infinite linear;
    }
    .radar-pulse-2 {
      animation-delay: 1.5s;
    }
    .radar-core {
      width: 14px;
      height: 14px;
      border-radius: 50%;
      background: #38bdf8;
      box-shadow: 0 0 15px #38bdf8, 0 0 30px #38bdf8;
      animation: core-breathe 2.5s infinite ease-in-out;
    }

    @keyframes pulse-out {
      0% { transform: scale(0.6); opacity: 0.8; }
      100% { transform: scale(1.6); opacity: 0; }
    }
    @keyframes core-breathe {
      0%, 100% { transform: scale(0.9); opacity: 0.8; box-shadow: 0 0 10px #38bdf8; }
      50% { transform: scale(1.2); opacity: 1; box-shadow: 0 0 20px #38bdf8, 0 0 30px #818cf8; }
    }

    h1 {
      font-family: 'Space Grotesk', sans-serif;
      color: #f3f4f6;
      margin: 0 0 0.5rem;
      font-size: 1.6rem;
      font-weight: 700;
      letter-spacing: 0.05em;
      text-transform: uppercase;
      background: linear-gradient(135deg, #38bdf8, #818cf8);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .status-badge {
      display: inline-block;
      font-family: 'Space Grotesk', sans-serif;
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 0.15em;
      padding: 4px 10px;
      border-radius: 6px;
      border: 1px solid rgba(56, 189, 248, 0.3);
      color: #38bdf8;
      background: rgba(56, 189, 248, 0.08);
      text-transform: uppercase;
      margin-bottom: 1.8rem;
    }

    /* Telemetry grid */
    .grid {
      display: grid;
      grid-template-cols: 1fr 1fr;
      gap: 12px;
      margin-bottom: 1.8rem;
    }
    .card {
      border: 1px solid rgba(255, 255, 255, 0.05);
      border-radius: 14px;
      background: rgba(10, 15, 30, 0.5);
      padding: 12px;
      text-align: left;
    }
    .card-label {
      font-size: 9px;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: #6b7280;
      margin-bottom: 4px;
      font-weight: 600;
    }
    .card-val {
      font-family: 'Space Grotesk', sans-serif;
      font-size: 1.1rem;
      font-weight: 700;
      color: #e5e7eb;
    }
    .text-sky { color: #38bdf8; }
    .text-purple { color: #a78bfa; }

    /* Animated Terminal */
    .terminal {
      background: rgba(5, 8, 16, 0.8);
      border: 1px solid rgba(255, 255, 255, 0.04);
      border-radius: 12px;
      padding: 12px 16px;
      font-family: 'Space Grotesk', monospace;
      font-size: 11px;
      text-align: left;
      height: 100px;
      overflow-y: auto;
      margin-bottom: 2rem;
      scrollbar-width: none;
    }
    .terminal::-webkit-scrollbar {
      display: none;
    }
    .log-line {
      margin-bottom: 4px;
      opacity: 0;
      transform: translateY(4px);
      animation: fade-in-up 0.4s forwards ease-out;
      color: #4b5563;
    }
    .log-line.active {
      color: #a78bfa;
    }
    .log-line.success {
      color: #34d399;
    }
    @keyframes spin {
      100% { transform: rotate(360deg); }
    }

    @keyframes fade-in-up {
      to { opacity: 1; transform: translateY(0); }
    }

    /* Restore button */
    a.btn {
      font-family: 'Space Grotesk', sans-serif;
      color: #ffffff;
      text-decoration: none;
      font-weight: 700;
      font-size: 13.5px;
      letter-spacing: 0.1em;
      border: 1px solid rgba(56, 189, 248, 0.6);
      background: linear-gradient(135deg, rgba(56, 189, 248, 0.2), rgba(129, 140, 248, 0.1));
      padding: 16px 20px;
      border-radius: 12px;
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      display: block;
      width: 100%;
      box-sizing: border-box;
      box-shadow: 0 0 15px rgba(56, 189, 248, 0.15), 
                  inset 0 1px 0 rgba(255, 255, 255, 0.1);
      cursor: pointer;
      position: relative;
      overflow: hidden;
    }
    a.btn::before {
      content: '';
      position: absolute;
      top: 0; left: -100%;
      width: 50%; height: 100%;
      background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.2), transparent);
      transition: 0.5s;
    }
    a.btn:hover::before {
      left: 150%;
    }
    a.btn:hover {
      background: linear-gradient(135deg, rgba(56, 189, 248, 0.35), rgba(129, 140, 248, 0.25));
      border-color: #38bdf8;
      box-shadow: 0 0 25px rgba(56, 189, 248, 0.35), 
                  0 0 50px rgba(139, 92, 246, 0.15);
      transform: translateY(-2px);
    }
    a.btn:active {
      transform: translateY(0);
    }

    .tip-text {
      margin-top: 1rem;
      font-size: 10px;
      color: #4b5563;
      font-weight: 500;
    }

    .click-anywhere-hint {
      margin-bottom: 1.8rem;
      font-family: 'Space Grotesk', sans-serif;
      font-size: 14.5px;
      letter-spacing: 0.05em;
      color: #38bdf8;
      opacity: 0.25;
      text-transform: uppercase;
      font-weight: 800;
      transition: opacity 0.5s ease, color 0.5s ease;
    }
    .click-anywhere-hint.active {
      color: #f1f5f9;
      opacity: 0.9;
      animation: pulse-hint 1.8s infinite ease-in-out;
      text-shadow: 0 0 10px rgba(56, 189, 248, 0.6);
    }
    @keyframes pulse-hint {
      0%, 100% { opacity: 0.5; transform: scale(0.97); }
      50% { opacity: 1.0; transform: scale(1.03); }
    }
  </style>
</head>
<body>
  <div class="container" style="cursor: default;" onclick="event.stopPropagation();">
    <div class="click-anywhere-hint" id="click-anywhere-hint">[ Nhấn phím bất kỳ để giải nén DOM ]</div>
    
    <div class="radar-box">
      <div class="radar-pulse-1"></div>
      <div class="radar-pulse-2"></div>
      <div class="radar-core"></div>
    </div>
    
    <h1 id="tab-title-display">Tab Đóng Băng</h1>
    <div class="status-badge" id="badge-status">Chế độ ngủ đông sâu</div>
    
    <div class="grid">
      <div class="card">
        <div class="card-label" id="lbl-orig">Dung lượng gốc</div>
        <div class="card-val text-sky" id="val-orig">--- KB</div>
      </div>
      <div class="card">
        <div class="card-label" id="lbl-comp">Sau khi nén</div>
        <div class="card-val text-purple" id="val-comp">--- KB</div>
      </div>
      <div class="card">
        <div class="card-label" id="lbl-ratio">RAM tối ưu</div>
        <div class="card-val text-sky" id="val-ratio">--- %</div>
      </div>
      <div class="card">
        <div class="card-label" id="lbl-forms">Bộ nhớ Form</div>
        <div class="card-val text-purple" id="val-forms">---</div>
      </div>
    </div>

    <div class="terminal" id="terminal-console">
      <!-- Lines will be injected by JavaScript -->
    </div>

    <a id="restore-btn" class="btn">GIẢI NÉN DOM & PHỤC HỒI TIẾN TRÌNH</a>
    <div class="tip-text" id="tip-desc">Ấn F5 hoặc nhấn nút để khôi phục trạng thái cũ. Biểu mẫu được phục hồi tự động.</div>
  </div>

  <script src="frozen.js"></script>
</body>
</html>
