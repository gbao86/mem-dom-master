<svg xmlns="http://www.w3.org/2000/svg" width="900" height="80" viewBox="0 0 900 80">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f0c29"/>
      <stop offset="50%" style="stop-color:#302b63"/>
      <stop offset="100%" style="stop-color:#24243e"/>
    </linearGradient>
  </defs>
  <rect width="900" height="80" fill="url(#bg)"/>
  <ellipse cx="100" cy="0" rx="180" ry="60" fill="#6d28d9" opacity="0.2">
    <animate attributeName="cx" values="100;150;100" dur="6s" repeatCount="indefinite"/>
  </ellipse>
  <ellipse cx="800" cy="80" rx="160" ry="55" fill="#4f46e5" opacity="0.2">
    <animate attributeName="cx" values="800;750;800" dur="7s" repeatCount="indefinite"/>
  </ellipse>
  <!-- Top divider line draw -->
  <line x1="900" y1="2" x2="900" y2="2" stroke="#a78bfa" stroke-width="1.5" opacity="0.5">
    <animate attributeName="x1" values="900;0" dur="1.5s" fill="freeze"/>
  </line>
  <text x="450" y="48" font-family="'Courier New', monospace" font-size="12"
        fill="#c4b5fd" text-anchor="middle" opacity="0.8">
    Made with ⚡ by Trịnh Gia Bảo · @gbao86
  </text>
</svg>
